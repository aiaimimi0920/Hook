<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="90" y1="40" x2="1110" y2="380" gradientUnits="userSpaceOnUse">
      <stop stop-color="#11120C"/>
      <stop offset="1" stop-color="#1B2114"/>
    </linearGradient>
    <linearGradient id="accent" x1="170" y1="90" x2="380" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F6FF66"/>
      <stop offset="1" stop-color="#83F77B"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#202615"/>
      <stop offset="1" stop-color="#171C10"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="1200" height="420" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect x="20" y="20" width="1160" height="380" rx="28" fill="url(#bg)" stroke="#2D3720" stroke-width="2" filter="url(#shadow)"/>

  <rect x="72" y="80" width="240" height="240" rx="40" fill="#0F130A" stroke="#343E25" stroke-width="2"/>
  <rect x="96" y="104" width="192" height="192" rx="32" fill="url(#accent)"/>
  <circle cx="192" cy="156" r="20" fill="#0F130A"/>
  <rect x="168" y="182" width="48" height="66" rx="16" fill="#0F130A"/>
  <rect x="140" y="256" width="104" height="14" rx="7" fill="#0F130A"/>

  <text x="360" y="128" fill="#F7FCE8" font-size="58" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Hook</text>
