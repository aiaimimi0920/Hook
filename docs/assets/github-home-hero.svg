  <rect x="500" y="248" width="126" height="42" rx="21" fill="#1F2B13" stroke="#BCE55B"/>
  <text x="563" y="275" text-anchor="middle" fill="#F4FFB3" font-size="18" font-family="Segoe UI, Arial, sans-serif" font-weight="600">Sticker</text>

  <rect x="640" y="248" width="146" height="42" rx="21" fill="#1F2B13" stroke="#BCE55B"/>
  <text x="713" y="275" text-anchor="middle" fill="#F4FFB3" font-size="18" font-family="Segoe UI, Arial, sans-serif" font-weight="600">Workflow</text>

  <rect x="800" y="248" width="126" height="42" rx="21" fill="#1F2B13" stroke="#BCE55B"/>
