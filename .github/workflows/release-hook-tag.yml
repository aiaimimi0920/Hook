name: Release Hook Tag

on:
  push:
    tags:
      - 'V*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish manually
        required: true
        type: string

permissions:
  contents: write

jobs:
  release-windows-exe:
    runs-on: windows-latest
    env:
      HOOK_UIACCESS_SIGNING_READY: ${{ secrets.HOOK_WINDOWS_UIACCESS_PFX_BASE64 != '' && secrets.HOOK_WINDOWS_UIACCESS_PFX_PASSWORD != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.95.0

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm dependencies
        run: npm ci

      - name: Build portable Hook EXE
        shell: powershell
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\build-local-hook-exe.ps1 -OutputDir "release\Hook\portable" -Force

      - name: Resolve release tag
        shell: powershell
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ github.event.inputs.tag }}"
          } else {
            $tag = "${{ github.ref_name }}"
          }

          if ([string]::IsNullOrWhiteSpace($tag)) {
            throw "Release tag is required."
          }

          if ($tag -notmatch '^V\d+\.\d+\.\d+$') {
            throw "Release tag must match Vx.x.x. Received: $tag"
          }

          "HOOK_TAG=$tag" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Package minimal release zip
        shell: powershell
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\package-release-zip.ps1 `
            -ExePath ".\release\Hook\portable\hook.exe" `
            -OutputDir ".\release\Hook" `
            -Tag "$env:HOOK_TAG" `
            -Force

      - name: Build UIAccess Hook EXE
        if: env.HOOK_UIACCESS_SIGNING_READY == 'true'
        shell: powershell
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\build-local-hook-exe.ps1 -OutputDir "release\Hook\uiaccess" -UiAccess -AllowUnsignedUiAccessBuild -Force

      - name: Materialize UIAccess signing certificate
        if: env.HOOK_UIACCESS_SIGNING_READY == 'true'
        shell: powershell
        env:
          HOOK_WINDOWS_UIACCESS_PFX_BASE64: ${{ secrets.HOOK_WINDOWS_UIACCESS_PFX_BASE64 }}
        run: |
          $pfxPath = Join-Path $env:RUNNER_TEMP "hook-uiaccess-signing.pfx"
          [System.IO.File]::WriteAllBytes(
            $pfxPath,
            [System.Convert]::FromBase64String($env:HOOK_WINDOWS_UIACCESS_PFX_BASE64)
          )
          "HOOK_UIACCESS_PFX_PATH=$pfxPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Sign UIAccess Hook EXE
        if: env.HOOK_UIACCESS_SIGNING_READY == 'true'
        shell: powershell
        env:
          HOOK_WINDOWS_UIACCESS_PFX_PASSWORD: ${{ secrets.HOOK_WINDOWS_UIACCESS_PFX_PASSWORD }}
        run: |
          $password = ConvertTo-SecureString $env:HOOK_WINDOWS_UIACCESS_PFX_PASSWORD -AsPlainText -Force
          $certificate = Import-PfxCertificate `
            -FilePath $env:HOOK_UIACCESS_PFX_PATH `
            -CertStoreLocation Cert:\CurrentUser\My `
            -Password $password
          if (-not $certificate) {
            throw "Failed to import the Hook UIAccess code-signing certificate."
          }
          $signature = Set-AuthenticodeSignature `
            -LiteralPath ".\release\Hook\uiaccess\hook.exe" `
            -Certificate $certificate
          if ($signature.Status -ne [System.Management.Automation.SignatureStatus]::Valid) {
            throw "UIAccess signing failed: $($signature.StatusMessage)"
          }

      - name: Package UIAccess installer zip
        if: env.HOOK_UIACCESS_SIGNING_READY == 'true'
        shell: powershell
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\package-uiaccess-installer-zip.ps1 `
            -ExePath ".\release\Hook\uiaccess\hook.exe" `
            -OutputDir ".\release\Hook" `
            -Tag "$env:HOOK_TAG" `
            -Force

      - name: Publish portable GitHub release asset
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.HOOK_TAG }}
          name: ${{ env.HOOK_TAG }}
          generate_release_notes: true
          working_directory: release/Hook
          files: |
            hook-windows-x64-${{ env.HOOK_TAG }}.zip
          overwrite_files: true
          fail_on_unmatched_files: true

      - name: Publish UIAccess installer GitHub release asset
        if: env.HOOK_UIACCESS_SIGNING_READY == 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.HOOK_TAG }}
          name: ${{ env.HOOK_TAG }}
          generate_release_notes: false
          working_directory: release/Hook
          files: |
            hook-windows-uiaccess-installer-${{ env.HOOK_TAG }}.zip
          overwrite_files: true
          fail_on_unmatched_files: true
